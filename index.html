<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vexorix AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#0a0a0a;color:#fff;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px;}
.chatbox{width:100%;max-width:600px;height:90vh;background:rgba(17,17,17,.9);border:1px solid rgba(0,255,204,.2);border-radius:20px;display:flex;flex-direction:column;box-shadow:0 0 40px rgba(0,255,204,.1);}
.header{padding:20px;border-bottom:1px solid rgba(255,255,255,.1);text-align:center;}
.header h1{color:#00ffcc;font-size:20px;}
.chat{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px;}
.msg{padding:12px 16px;border-radius:14px;max-width:80%;line-height:1.6;white-space:pre-wrap;}
.user{align-self:flex-end;background:#00ffcc;color:#000;}
.ai{align-self:flex-start;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);}
.input-area{display:flex;padding:15px;border-top:1px solid rgba(255,255,255,.1);gap:10px;}
.input-area input{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:12px 15px;color:#fff;outline:none;}
.input-area button{background:#00ffcc;color:#000;border:none;border-radius:12px;padding:12px 20px;font-weight:700;cursor:pointer;transition:.2s;}
</style>
</head>
<body>
<div class="chatbox">
<div class="header"><h1>⚡ Vexorix AI</h1></div>
<div class="chat" id="chat"><div class="msg ai">Halo king, mau tanya apa? 🫡</div></div>
<div class="input-area"><input type="text" id="prompt" placeholder="Tanya apa aja..." autocomplete="off"><button id="send">Kirim</button></div>
</div>
<script>
const chatEl = document.getElementById('chat');
const inputEl = document.getElementById('prompt');
const btnEl = document.getElementById('send');
let messages = [{role:"system", content:"Kamu adalah Vexorix AI. Jawab singkat, to the point, gaya santai tapi pinter. Bahasa Indonesia."}];

async function sendMsg(){
const text = inputEl.value.trim();
if(!text) return;
addMsg(text, 'user'); inputEl.value = ''; btnEl.disabled = true;
const loadingEl = addMsg("...", 'ai');
messages.push({role:"user", content:text});
try{
  // [PENTING] INI UDAH GANTI. GAK PAKE API KEY LAGI
  const res = await fetch("/api/chat", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model: "llama-3.1-8b-instant", messages: messages})
  });
  const data = await res.json();
  const aiText = data.choices[0].message.content;
  loadingEl.remove(); addMsg(aiText, 'ai');
  messages.push({role:"assistant", content:aiText});
}catch(e){ loadingEl.remove(); addMsg("Error king: "+e.message, 'ai'); }
btnEl.disabled = false; inputEl.focus();
}
function addMsg(text, type){const div = document.createElement('div');div.className = `msg ${type}`;div.textContent = text;chatEl.appendChild(div);chatEl.scrollTop = chatEl.scrollHeight;return div;}
btnEl.onclick = sendMsg;
inputEl.addEventListener('keypress', e => {if(e.key === 'Enter') sendMsg();});
</script>
</body>
</html>
